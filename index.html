<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babi&Jeff Bolos e Doces</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="titulo">🍰Babi&Jeff Bolos e Doces</h1>

    <h2>Cardápio do Dia</h2>

    <div id="produtos" class="grid"></div>

    <div class="container-principal">

<!-- Formulário de Finalização de Pedido -->
    <div class="pedido-box">

        <h2>📋🖋Finalizar Pedido</h2>

    <div class="formulario">
        <input type="text" id="nome" placeholder="Digite seu nome"><br>
        <input type="text" id="celular" placeholder="Digite seu celular"><br>
        <input type="text" id="endereco" placeholder="Digite seu endereço"><br><br>
    
        <select id="pagamento">
        <option value="">Selecione a forma de pagamento</option>
        <option value="pix">PIX</option>
        <option value="dinheiro">Dinheiro</option>
    </select><br><br>
    </div>
    </div>
    
    <div class="carrinho-box">
<!-- Carrinho de Compras -->
    <h2>🛒 Carrinho</h2>

    <div id="lista-carrinho" class="carrinho"></div>

    <h2 id="total" class="total">Total: R$ 0.00</h2>

    <button class="btn-finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
                

        </div>

    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
